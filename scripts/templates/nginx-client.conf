# ============================================================
# Nginx — Instance Event Analytics : {{CLIENT_SLUG}}
# Domaine  : {{CLIENT_DOMAIN}}
# Port     : {{CLIENT_PORT}}
# Généré le: {{DATE}}
#
# Variables à remplacer : {{CLIENT_SLUG}} {{CLIENT_DOMAIN}} {{CLIENT_PORT}}
# Installation :
#   sudo cp ce-fichier /etc/nginx/sites-available/ea-{{CLIENT_SLUG}}.conf
#   sudo ln -s /etc/nginx/sites-available/ea-{{CLIENT_SLUG}}.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d {{CLIENT_DOMAIN}}
# ============================================================

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name {{CLIENT_DOMAIN}};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Instance principale HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name {{CLIENT_DOMAIN}};

    # ── SSL — géré par Certbot ────────────────────────────────────────────────
    # ssl_certificate     /etc/letsencrypt/live/{{CLIENT_DOMAIN}}/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/{{CLIENT_DOMAIN}}/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Sécurité headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Basic Auth — protection accès client (V1) ─────────────────────────────
    # Protège l'ensemble du site (frontend + API)
    # Le navigateur met en cache les credentials → API calls transparents
    auth_basic "Event Analytics — Accès privé";
    auth_basic_user_file /var/www/eventanalytics/clients/{{CLIENT_SLUG}}/.htpasswd;

    # ── Health check public (monitoring, pas d'auth) ──────────────────────────
    location = /health {
        auth_basic off;
        proxy_pass http://127.0.0.1:{{CLIENT_PORT}};
        proxy_set_header Host $host;
    }

    # ── Frontend compilé — partagé entre tous les clients ─────────────────────
    location / {
        root /var/www/eventanalytics/app/frontend_build;
        try_files $uri $uri/ /index.html;

        # index.html : jamais en cache (garantit que le client charge la dernière version)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }

        # Assets versionnés par Vite (hash dans le nom) : cache permanent
        location ~* \.(js|css)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Fonts et images statiques : cache 1 semaine
        location ~* \.(woff2?|png|ico|svg|jpg|jpeg|webp)$ {
            add_header Cache-Control "public, max-age=604800";
        }
    }

    # ── API — routée vers le backend de CE client ─────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:{{CLIENT_PORT}};
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (rapports IA streaming) — désactiver le buffering
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Upgrade pour WebSocket (futur)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Logs dédiés par client ────────────────────────────────────────────────
    access_log /var/www/eventanalytics/clients/{{CLIENT_SLUG}}/logs/nginx-access.log;
    error_log  /var/www/eventanalytics/clients/{{CLIENT_SLUG}}/logs/nginx-error.log warn;
}
